name: Feature Request
description: Suggest a new feature or improvement for IdeaGauntlet
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What do you want to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - MCP server
        - New workflow / mode
        - New provider
        - Agent integration (Claude/Codex/Cursor)
        - Report / output format
        - Documentation
        - Other
    validations:
      required: true

name: Bug Report
description: Report a bug in IdeaGauntlet
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `idea-gauntlet quick "my idea"`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"
    validations:
      required: true
  - type: input
    id: ig-version
    attributes:
      label: IdeaGauntlet version
      placeholder: "0.2.3"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Which mode triggered the bug?
      options:
        - quick
        - court
        - users
        - mvp
        - compare
        - setup / install
        - mcp
        - doctor
        - other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      render: shell
